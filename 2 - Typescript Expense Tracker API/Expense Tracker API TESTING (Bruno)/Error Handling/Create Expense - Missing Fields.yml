info:
  name: Create Expense - Missing Fields
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/expenses
  body:
    type: json
    data: |-
      {
        "title": "Twilight Movie"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Should return 400 for missing fields", function() {
          expect(res.getStatus()).to.equal(400);
        });

        test("Should return an array of error messages", function() {
          expect(res.getBody()).to.be.an('array');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
