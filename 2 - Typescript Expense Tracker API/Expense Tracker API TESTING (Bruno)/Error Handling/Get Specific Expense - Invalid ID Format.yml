info:
  name: Get Specific Expense - Invalid ID Format
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:3000/api/expenses/123
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Should return 404 for malformed ID", function() {
          expect(res.getStatus()).to.equal(404);
          expect(res.getBody().message).to.contain("don't exist");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
